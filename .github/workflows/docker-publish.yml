name: Docker Build, Scan and Publish

on:
  push:
    branches: ["main"]
    # Nasłuchiwanie na tagi, aby wykorzystać wersjonowanie semantyczne
    tags: ["v*.*.*"]
  workflow_dispatch:

# Zmienne
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rusty-weather
  CACHE_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/rusty-weather-cache

# Zadania
jobs:
  build-scan-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Uruchomienie agenta SSH w chmurze i załadowanie klucza z sekretów
      - name: Start SSH Agent and load private key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Logowanie do GHCR
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Logowanie do DockerHub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Konfiguracja środowiska QUEMU i Buildx
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Tagowanie
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      # Budowa lokalnego obrazu w jednej architekturze przeznaczonego do skanowania
      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile_dod
          load: true
          tags: localbuild/testimage:latest
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:buildcache
          ssh: |
            sskew=${{ env.SSH_AUTH_SOCK }}

      # Test CVE z użyciem Trivy, przerywane w przypadku znalezienia krytycznych lub wysokich podatności 
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "localbuild/testimage:latest"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      # Budowa multi-arch, push do GHXT, cache'owanie w trybie max
      - name: Build and push final image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile_dod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Oddzielne repozytorium cache'owane w DockerHub
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }}:buildcache,mode=max
          ssh: |
            sskew=${{ env.SSH_AUTH_SOCK }}
